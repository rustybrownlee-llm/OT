{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OT Simulator Admin - {{.Title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <!-- CodeMirror 6 ESM import map -- resolved server-side by esm.sh CDN.
         Only pages that include <script type="module"> blocks use these imports.
         Import maps are supported in Chrome 89+, Firefox 108+, Safari 16.4+. -->
    <script type="importmap">
    {
      "imports": {
        "codemirror": "https://esm.sh/codemirror@6",
        "@codemirror/lang-yaml": "https://esm.sh/@codemirror/lang-yaml@6",
        "@codemirror/language": "https://esm.sh/@codemirror/language@6",
        "@codemirror/lint": "https://esm.sh/@codemirror/lint@6",
        "@codemirror/view": "https://esm.sh/@codemirror/view@6",
        "@codemirror/state": "https://esm.sh/@codemirror/state@6"
      }
    }
    </script>
    <style>
        /* YAML syntax highlighting -- mirrors monitoring dashboard CSS classes */
        .yaml-key          { color: #0d6efd; }
        .yaml-value        { color: #198754; }
        .yaml-comment      { color: #6c757d; font-style: italic; }
        .yaml-list-marker  { color: #dc3545; }
        pre.yaml-source    { background: #f8f9fa; padding: 1rem; border-radius: 0.375rem; overflow-x: auto; }

        /* Sidebar layout */
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .admin-wrapper { display: flex; flex: 1; }
        .admin-sidebar {
            width: 220px;
            min-width: 220px;
            background: #212529;
            padding-top: 1rem;
        }
        .admin-main { flex: 1; padding: 1.5rem; overflow-x: auto; }

        /* Sidebar nav links */
        .sidebar-link {
            display: block;
            padding: 0.5rem 1.25rem;
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .sidebar-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .sidebar-link.active { color: #fff; background: rgba(255,255,255,0.15); font-weight: 600; }
        .sidebar-section {
            color: rgba(255,255,255,0.4);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.75rem 1.25rem 0.25rem;
        }

        /* Status indicators */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-online  { background: #198754; }
        .status-offline { background: #dc3545; }
        .status-unknown { background: #6c757d; }

        /* YAML editor layout */
        .editor-layout { display: flex; gap: 0; flex: 1; min-height: 0; }
        .editor-filetree {
            width: 250px; min-width: 250px; background: #f8f9fa;
            border-right: 1px solid #dee2e6; overflow-y: auto; padding: 0.5rem;
        }
        .editor-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .editor-toolbar {
            background: #fff; border-bottom: 1px solid #dee2e6;
            padding: 0.5rem 0.75rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .editor-cm-wrapper { flex: 1; overflow: auto; }
        .editor-validation { height: 200px; border-top: 1px solid #dee2e6; overflow-y: auto; }

        /* File tree styles */
        .filetree-list { list-style: none; padding-left: 0; margin: 0; }
        .filetree-list .filetree-list { padding-left: 1rem; }
        .filetree-item { font-size: 0.85rem; }
        .filetree-dir {
            cursor: pointer; padding: 0.2rem 0.25rem; color: #495057;
            user-select: none; display: flex; align-items: center; gap: 0.25rem;
        }
        .filetree-dir:hover { background: #e9ecef; border-radius: 3px; }
        .filetree-file-link {
            display: block; padding: 0.2rem 0.25rem; color: #0d6efd;
            text-decoration: none; font-family: monospace; font-size: 0.8rem;
            border-radius: 3px;
        }
        .filetree-file-link:hover { background: #e9ecef; color: #0a58ca; }
        .filetree-file-link.active {
            background: #0d6efd; color: #fff; font-weight: 600;
        }

        /* CodeMirror container */
        .cm-editor { height: 100%; font-size: 0.9rem; }
        .cm-scroller { overflow: auto; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">OT Simulator Admin</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="http://localhost:8090" target="_blank">
                    Monitoring Dashboard
                </a>
            </div>
        </div>
    </nav>
    <div class="admin-wrapper">
        {{template "nav" .}}
        <main class="admin-main">
            {{template "content" .}}
        </main>
    </div>
    <footer class="bg-dark text-center py-2">
        <small class="text-muted">Admin Dashboard &mdash; OT Simulator</small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{end}}
