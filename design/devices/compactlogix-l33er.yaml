# compactlogix-l33er.yaml - Allen-Bradley CompactLogix 5380 L33ER Device Atom
# Describes what this device type is and what it can do, independent of deployment role.
# Per ADR-009 D3: register capabilities define capacity; register_map_variants define role-specific layouts.
# [OT-REVIEW #1] The CompactLogix 5380 L33ER is Ethernet-native. It has no RS-485 port.
# Modbus TCP is supported via EtherNet/IP explicit messaging or Add-On Instructions.
schema_version: "0.1"

device:
  id: "compactlogix-l33er"
  vendor: "Allen-Bradley"
  model: "CompactLogix 5380 L33ER"
  category: "plc"              # plc | gateway | hmi | sensor | relay | safety-controller
  vintage: 2024
  description: "Modern Ethernet-native PLC for water treatment Level 1"

connectivity:
  ports:
    # EtherNet/IP native; Modbus TCP via Add-On Instruction or explicit messaging
    - type: "ethernet"
      protocols: ["modbus-tcp"]
  response_delay_ms: 5         # Typical: 2-10ms for a modern PLC
  response_jitter_ms: 3        # Small timing variation
  concurrent_connections: 32   # [OT-REVIEW #10] EtherNet/IP supports 32 concurrent connections

# Register capabilities define what this device type supports in terms of address space.
# These are hardware limits -- not role-specific register assignments.
# Named register maps (e.g., "water-intake") are in register_map_variants below.
# Water treatment registers use metric units (L/s, kPa, NTU, degC).
# Manufacturing floor registers use imperial units (ft/min, PSI, GPM, degF).
# This mixed-unit split reflects the facility's operational history (common in US facilities).
registers:
  max_holding: 4096
  max_coils: 2048
  max_input_registers: 4096
  max_discrete_inputs: 2048
  addressing: "zero-based"
  float_byte_order: "big-endian"   # Network byte order (Modbus standard)
  max_registers_per_read: 125      # Modbus spec maximum

# Register map variants define role-specific register layouts.
# The same device type serves different roles by loading different variants.
# Each variant must stay within the register capabilities declared above.
# The environment template selects a variant via register_map_variant in the placement.
# If no variant is specified, the device exposes empty registers within its capacity.
register_map_variants:
  water-intake:
    # Intake PLC: controls raw water pumps and monitors raw water quality.
    # [OT-REVIEW #7] Chlorine dosing and filtration are at the treatment stage (water-treatment variant).
    # Conventions: 16-bit scaled integers (0=scale_min, 32767=scale_max). Zero-based addressing.
    holding:
      - { address: 0, name: intake_flow_rate,     unit: "L/s",   scale_min: 0, scale_max: 100, writable: false, description: "Raw water intake flow rate" }
      - { address: 1, name: intake_pump_speed,     unit: "%",     scale_min: 0, scale_max: 100, writable: true,  description: "Intake pump speed setpoint (0-100%)" }
      - { address: 2, name: raw_water_ph,          unit: "pH",    scale_min: 0, scale_max: 14,  writable: false, description: "Raw water pH at intake" }
      - { address: 3, name: raw_water_turbidity,   unit: "NTU",   scale_min: 0, scale_max: 100, writable: false, description: "Raw water turbidity (untreated, higher range than post-filter)" }
      - { address: 4, name: intake_water_temp,     unit: "degC",  scale_min: 0, scale_max: 40,  writable: false, description: "Raw water temperature" }
    coils:
      - { address: 0, name: intake_pump_01_run,   writable: true,  description: "Intake pump 1 run command (0=stop, 1=run)" }
      - { address: 1, name: intake_pump_02_run,   writable: true,  description: "Intake pump 2 run command (0=stop, 1=run)" }
      - { address: 2, name: screen_wash_active,   writable: false, description: "Travelling screen wash cycle in progress (intake debris removal)" }
      - { address: 3, name: low_well_level_alarm, writable: false, description: "Intake well level below minimum threshold" }

  water-treatment:
    # Treatment PLC: filtration, chemical dosing, and UV sterilization.
    # This is the middle stage: intake -> treatment -> distribution.
    # Filter differential pressure is the key indicator for filter fouling and backwash timing.
    # Zero-based addressing.
    holding:
      - { address: 0, name: filter_inlet_pressure,       unit: "kPa",    scale_min: 0, scale_max: 500, writable: false, description: "Pressure upstream of filter media" }
      - { address: 1, name: filter_outlet_pressure,      unit: "kPa",    scale_min: 0, scale_max: 500, writable: false, description: "Pressure downstream of filter media" }
      - { address: 2, name: filter_differential_pressure, unit: "kPa",   scale_min: 0, scale_max: 50,  writable: false, description: "Differential pressure across filter (backwash trigger: >15-25 kPa, vessel damage risk: >50 kPa)" }
      - { address: 3, name: uv_intensity,                unit: "mW/cm2", scale_min: 0, scale_max: 100, writable: false, description: "UV sterilizer lamp intensity (real-time measurement, not dose)" }
      - { address: 4, name: chemical_feed_rate,          unit: "mL/min", scale_min: 0, scale_max: 500, writable: true,  description: "Sodium hypochlorite dosing rate (moved from intake -- dosing is a treatment function)" }
      - { address: 5, name: chlorine_residual,           unit: "mg/L",   scale_min: 0, scale_max: 5,   writable: false, description: "Post-treatment chlorine residual concentration (moved from intake -- measured after dosing)" }
      - { address: 6, name: turbidity_post_filter,       unit: "NTU",    scale_min: 0, scale_max: 5,   writable: false, description: "Post-filtration turbidity (regulatory compliance point, should be <1 NTU for treated water)" }
    coils:
      - { address: 0, name: filter_backwash_command, writable: true,  description: "Initiate filter backwash sequence (single coil triggers multi-minute automated cycle: close influent, open backwash supply, wash, settle, return to service)" }
      - { address: 1, name: chemical_feed_pump_run,  writable: true,  description: "Sodium hypochlorite dosing pump run command (moved from intake -- dosing is a treatment function)" }
      - { address: 2, name: uv_system_active,        writable: false, description: "UV sterilization system energized (read-only status)" }
      - { address: 3, name: high_dp_alarm,           writable: false, description: "Filter differential pressure exceeds backwash threshold (read-only alarm)" }

  water-distribution:
    # Distribution PLC: controls clear well pumps and monitors finished water quality.
    # [OT-REVIEW] Residual chlorine and water temperature are standard distribution
    # measurements and regulatory compliance points for finished water leaving the plant.
    # Zero-based addressing.
    holding:
      - { address: 0, name: clear_well_level,        unit: "%",    scale_min: 0, scale_max: 100, writable: false, description: "Clear well water level" }
      - { address: 1, name: distribution_flow_rate,  unit: "L/s",  scale_min: 0, scale_max: 150, writable: false, description: "Outbound distribution flow rate" }
      - { address: 2, name: distribution_pressure,   unit: "kPa",  scale_min: 0, scale_max: 700, writable: false, description: "Distribution header pressure" }
      - { address: 3, name: residual_chlorine,        unit: "mg/L", scale_min: 0, scale_max: 5,   writable: false, description: "Finished water chlorine residual (regulatory compliance point)" }
      - { address: 4, name: distribution_water_temp, unit: "degC", scale_min: 0, scale_max: 40,  writable: false, description: "Finished water temperature leaving plant" }
    coils:
      - { address: 0, name: distribution_pump_01_run, writable: true, description: "Distribution pump 1 run command (0=stop, 1=run)" }
      - { address: 1, name: distribution_pump_02_run, writable: true, description: "Distribution pump 2 run command (0=stop, 1=run)" }
      - { address: 2, name: booster_pump_run,          writable: true, description: "Booster pump run command for cross-plant supply" }

  compressor-control:
    # Gas turbine-driven centrifugal compressor control.
    # CompactLogix serves as the "station PLC" aggregating compressor unit data for SCADA.
    # In real compressor stations, each compressor unit has its own Unit PLC (often vendor-supplied).
    # The station PLC aggregates unit data and provides the SCADA interface.
    # Imperial units throughout -- US pipeline industry standard for compressor stations.
    # Zero-based addressing (CompactLogix convention -- contrast with ROC800 one-based convention).
    holding:
      - address: 0
        name: "compressor_speed"
        description: "Compressor shaft speed (centrifugal compressor driven by gas turbine; 3000-5500 RPM operating range)"
        unit: "RPM"
        scale_min: 0
        scale_max: 6000           # Gas turbine-driven centrifugal: 3000-5500 RPM operating; headroom to 6000 for transients
        writable: false
      - address: 1
        name: "suction_pressure"
        description: "Compressor suction (inlet) pressure from upstream pipeline"
        unit: "PSIG"
        scale_min: 0
        scale_max: 1500           # Transmission pipeline: 400-800 PSIG typical at suction
        writable: false
      - address: 2
        name: "discharge_pressure"
        description: "Compressor discharge (outlet) pressure to downstream pipeline (compression ratio typically 1.2-2.0)"
        unit: "PSIG"
        scale_min: 0
        scale_max: 1500           # 800-1400 PSIG typical at discharge
        writable: false
      - address: 3
        name: "bearing_temp_drive_end"
        description: "Compressor drive-end radial bearing temperature (proximity to gas turbine makes this the hotter bearing). Normal: 150-250 degF. Alarm: 275. Trip: 300."
        unit: "degF"
        scale_min: 0
        scale_max: 350            # Range covers trip threshold (300 degF) with headroom
        writable: false
      - address: 4
        name: "bearing_temp_non_drive_end"
        description: "Compressor non-drive-end radial bearing temperature. Normal: 150-250 degF. Alarm: 275. Trip: 300."
        unit: "degF"
        scale_min: 0
        scale_max: 350
        writable: false
      - address: 5
        name: "vibration_overall"
        description: "Compressor overall vibration level (radial, peak-to-peak). Bently Nevada 3300 or equivalent proximity probes. Normal: <2 mils. Alarm: 3 mils. Trip: 5 mils."
        unit: "mils"
        scale_min: 0
        scale_max: 10             # Range beyond trip threshold (5 mils) to capture transient exceedances
        writable: false
      - address: 6
        name: "lube_oil_pressure"
        description: "Lube oil header pressure at bearing inlet (low pressure is critical: bearing failure risk). Normal: 25-45 PSIG. Low alarm: 15 PSIG. Trip: 10 PSIG."
        unit: "PSIG"
        scale_min: 0
        scale_max: 100            # [OT-REVIEW] Changed from 60 to 100: provides headroom for fault conditions and matches common 0-100 PSIG transmitter range
        writable: false
      - address: 7
        name: "lube_oil_temperature"
        description: "Lube oil temperature at bearing inlet (maintained 120-140 degF by oil cooler). High alarm: 160. Oil breakdown risk >180 degF."
        unit: "degF"
        scale_min: 0
        scale_max: 200            # Covers alarm threshold (160) and breakdown zone (180+)
        writable: false
      - address: 8
        name: "compressor_status_word"
        description: "Compressor status bitmask: bit0=running, bit1=ready, bit2=tripped, bit3=surge-detected, bit4=high-vibration, bit5=high-bearing-temp, bit6=low-lube-oil, bit7=ESD-active"
        unit: "bitmask"
        scale_min: 0
        scale_max: 65535
        writable: false
    coils:
      # [OT-REVIEW] Single run_cmd coil matches water/mfg coil pattern.
      # 1=run initiates full startup sequence: lube oil priming, ignition, ramp to speed.
      # 0=stop initiates controlled shutdown: unload, cool-down, secure.
      # All permissives (lube oil, vibration, temp) must be satisfied before startup sequence proceeds.
      - address: 0
        name: "compressor_run_cmd"
        description: "[OT-REVIEW] Single run/stop command (1=run startup sequence, 0=controlled stop). Requires all permissives satisfied. Replaces separate start/stop coils to match water/mfg coil pattern."
        writable: true
      # [OT-REVIEW] E-stop is hardwired safety -- PLC reads the circuit state but cannot override it.
      # E-stop trips the compressor immediately, bypassing the normal cool-down shutdown sequence.
      - address: 1
        name: "compressor_e_stop"
        description: "[OT-REVIEW] Emergency stop circuit active -- hardwired safety, PLC reads but cannot override. Trips compressor immediately bypassing normal shutdown sequence."
        writable: false           # [OT-REVIEW] Hardwired safety: read-only status, not Modbus-writable command
      - address: 2
        name: "surge_protection_active"
        description: "Anti-surge protection system active (read-only -- anti-surge controller opens recycle valve automatically when compressor approaches surge line)"
        writable: false
      - address: 3
        name: "compressor_tripped"
        description: "Compressor has tripped on safety interlock (read-only -- high vibration, high bearing temp, low lube oil, or ESD. Requires local reset after fault clearance.)"
        writable: false

  ww-aeration:
    # Aeration blower control for dissolved oxygen management -- 2013 modernization.
    # The CompactLogix L33ER replaced the 1997 SLC-500s for this system because the
    # original SLC-500s lacked the I/O density and Ethernet connectivity required for
    # variable-frequency drive (VFD) communication and expanded analog I/O.
    # Zero-based addressing (CompactLogix convention -- contrast with SLC-500 one-based).
    # Registers use 16-bit scaled integers: 0=scale_min, 32767=scale_max.
    # ATTACK SURFACES: do_setpoint (PRIMARY -- writing 0.0-0.5 mg/L creates anoxic conditions;
    #                  PLC's PID loop reduces blower speed to match spoofed setpoint; biomass
    #                  crashes; recovery takes days to weeks),
    #                  blower_speed_setpoint (SECONDARY -- writing 0% with DO control disabled
    #                  stalls blowers and creates anoxic conditions directly).
    # VFD TEACHING POINT: PLCs write a percentage command to the VFD; the VFD executes it.
    # Blower speed setpoint (%) and feedback (RPM) are separate registers -- setpoint is what
    # the PLC commands, feedback is what the VFD reports as actual shaft speed.
    holding:
      - address: 0
        name: "blower_speed_setpoint"
        description: "Blower VFD speed setpoint (writable % command from PLC to VFD -- ATTACK SURFACE: writing 0% with DO control disabled stalls blowers and creates anoxic conditions)"
        unit: "%"
        scale_min: 0
        scale_max: 100
        writable: true
      - address: 1
        name: "blower_speed_feedback"
        description: "Blower VFD speed feedback (read-only actual shaft speed reported from VFD -- distinct from setpoint; teaches VFD setpoint/feedback architecture)"
        unit: "RPM"
        scale_min: 0
        scale_max: 3600
        writable: false
      - address: 2
        name: "do_setpoint"
        description: "Dissolved oxygen setpoint for PID control (writable mg/L -- PRIMARY ATTACK SURFACE: writing 0.0-0.5 creates anoxic conditions; PLC reduces blower speed to match; DO crashes below 1.0 mg/L = dead zone for activated sludge)"
        unit: "mg/L"
        scale_min: 0
        scale_max: 8
        writable: true
      - address: 3
        name: "dissolved_oxygen"
        description: "Dissolved oxygen measurement from inline probe (read-only; control target typically 2.0 mg/L; below 1.0 = anoxic; above 4.0 = energy waste; blowers are 50-70% of plant electricity cost)"
        unit: "mg/L"
        scale_min: 0
        scale_max: 12
        writable: false
      - address: 4
        name: "air_flow_rate"
        description: "Aeration air flow rate from blower to basin diffusers (standard cubic feet per minute)"
        unit: "SCFM"
        scale_min: 0
        scale_max: 5000
        writable: false
      - address: 5
        name: "blower_discharge_pressure"
        description: "Blower discharge pressure at outlet header (elevated pressure indicates clogged diffusers or closed valves)"
        unit: "PSI"
        scale_min: 0
        scale_max: 15
        writable: false
      - address: 6
        name: "blower_inlet_temperature"
        description: "Blower inlet air temperature (ambient to heated; high inlet temperature reduces blower efficiency and increases motor load)"
        unit: "degF"
        scale_min: 30
        scale_max: 120
        writable: false
      - address: 7
        name: "blower_motor_current"
        description: "Blower motor current draw (load indicator; high current with low airflow indicates mechanical resistance or clogged diffusers)"
        unit: "A"
        scale_min: 0
        scale_max: 200
        writable: false
      - address: 8
        name: "aeration_basin_level"
        description: "Aeration basin water surface elevation (typical municipal SWD 10-15 ft; level variation indicates imbalanced flow distribution between basins)"
        unit: "ft"
        scale_min: 0
        scale_max: 15
        writable: false
      - address: 9
        name: "mlss"
        description: "Mixed liquor suspended solids concentration (target 2000-4000 mg/L for activated sludge; below 1000 = under-seeded; above 6000 = risk of clarifier overload)"
        unit: "mg/L"
        scale_min: 0
        scale_max: 10000
        writable: false
      - address: 10
        name: "sour"
        description: "Specific oxygen uptake rate (PLC-calculated from DO uptake rate and MLSS measurement -- NOT a raw sensor; near-zero indicates dead or severely inhibited sludge; cannot be spoofed by replaying a Modbus write without first spoofing source inputs)"
        unit: "mg O2/g MLSS/hr"
        scale_min: 0
        scale_max: 30
        writable: false
      - address: 11
        name: "blower_run_hours"
        description: "Blower cumulative run hours (read-only predictive maintenance counter; this is the register the blower vendor reads via the Cradlepoint cellular link for predictive maintenance scheduling)"
        unit: "hours"
        scale_min: 0
        scale_max: 999999
        writable: false
    coils:
      - address: 0
        name: "blower_1_run"
        description: "Blower 1 VFD run command (0=stop, 1=run -- at least one blower must run when DO control is enabled)"
        writable: true
      - address: 1
        name: "blower_2_run"
        description: "Blower 2 VFD run command (0=stop, 1=run -- lead/lag configuration; both run at high load)"
        writable: true
      - address: 2
        name: "aeration_valve_auto"
        description: "Aeration basin air distribution valve mode (0=manual, 1=auto -- auto mode allows PLC to balance airflow between basin zones)"
        writable: true
      - address: 3
        name: "do_control_enable"
        description: "Dissolved oxygen PID control enable (0=manual blower speed, 1=automatic DO-based PID control -- disabling this forces blower_speed_setpoint to manual operation)"
        writable: true

diagnostics:
  web_server: true
  web_port: 80
  snmp: false
  syslog: false
  fault_log: true
  fault_log_depth: 100
