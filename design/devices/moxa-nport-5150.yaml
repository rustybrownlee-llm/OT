# moxa-nport-5150.yaml - Moxa NPort 5150 Serial-to-Ethernet Gateway Device Atom
# The NPort 5150 bridges one RS-232/RS-485 serial port to Ethernet via Modbus TCP.
# It is a transparent serial-to-TCP converter -- real NPort devices have no Modbus
# registers of their own. The serial-gateway variant below is a simulated educational
# abstraction that models gateway status as Modbus holding registers.
schema_version: "0.1"

device:
  id: "moxa-nport-5150"
  vendor: "Moxa"
  model: "NPort 5150"
  category: "gateway"          # plc | gateway | hmi | sensor | relay | safety-controller
  vintage: 2010
  description: "Serial-to-Ethernet device server bridging RS-485 PLCs to Modbus TCP"

connectivity:
  ports:
    - type: "ethernet"
      protocols: ["modbus-tcp"]
    - type: "rs485"
      protocols: ["modbus-rtu"]
  response_delay_ms: 15        # Serial RTT overhead: 10-20ms typical
  response_jitter_ms: 10
  # [OT-REVIEW #3] 4 TCP connections accepted, but serial port access is serialized --
  # only one active connection can transact with the downstream serial device at a time.
  concurrent_connections: 4

# NOTE: Real NPort 5150 devices have NO Modbus registers. They are transparent
# serial-to-TCP converters. The register capacity below matches the simulated
# serial-gateway variant, which models gateway status as an educational abstraction.
# [OT-REVIEW #3] Baud rate is a coded enum (0-7) to stay within 16-bit register range.
registers:
  max_holding: 9              # Matches serial-gateway variant (simulated, not real hardware)
  max_coils: 0
  max_input_registers: 0
  max_discrete_inputs: 0
  addressing: "zero-based"
  float_byte_order: "big-endian"
  max_registers_per_read: 125

register_map_variants:
  serial-gateway:
    # SIMULATED: Real NPort 5150 does not expose Modbus registers.
    # This variant models gateway status as an educational abstraction,
    # teaching engineers that infrastructure devices have observable state.
    # All registers are read-only -- a gateway's status is observed, not commanded via Modbus.
    holding:
      - address: 0
        name: "serial_port_status"
        description: "Serial port operational state"
        unit: "enum"            # 0=offline, 1=online, 2=error
        scale_min: 0
        scale_max: 2
        writable: false
      - address: 1
        name: "serial_baud_rate"
        description: "Serial port baud rate (coded enum, not raw bps)"
        unit: "enum"            # 0=1200, 1=2400, 2=4800, 3=9600, 4=19200, 5=38400, 6=57600, 7=115200
        scale_min: 0
        scale_max: 7
        writable: false         # [OT-REVIEW #3] Coded enum avoids exceeding 16-bit register range
      - address: 2
        name: "serial_data_format"
        description: "Serial data format (coded enum)"
        unit: "enum"            # 0=8N1, 1=8E1, 2=8O1, 3=7E1
        scale_min: 0
        scale_max: 3
        writable: false
      - address: 3
        name: "serial_mode"
        description: "Serial interface electrical mode"
        unit: "enum"            # 0=RS-232, 1=RS-422, 2=RS-485-2wire, 3=RS-485-4wire
        scale_min: 0
        scale_max: 3
        writable: false
      - address: 4
        name: "active_tcp_connections"
        description: "Current TCP client connections (max 4, but serial access is serialized)"
        unit: "count"
        scale_min: 0
        scale_max: 4
        writable: false
      - address: 5
        name: "serial_tx_count"
        description: "Messages forwarded from TCP to serial port"
        unit: "msgs"
        scale_min: 0
        scale_max: 65535
        writable: false
      - address: 6
        name: "serial_rx_count"
        description: "Messages received from serial port"
        unit: "msgs"
        scale_min: 0
        scale_max: 65535
        writable: false
      - address: 7
        name: "serial_error_count"
        description: "Serial parity, framing, and overrun errors"
        unit: "count"
        scale_min: 0
        scale_max: 65535
        writable: false
      - address: 8
        name: "uptime_hours"
        description: "Device uptime since last power cycle"
        unit: "hours"
        scale_min: 0
        scale_max: 65535
        writable: false
    coils: []  # Gateway has no coils (max_coils: 0)

  pipeline-serial:
    # SIMULATED: Real NPort 5150 does not expose Modbus registers.
    # This variant models gateway status for the pipeline serial bus,
    # bridging legacy gas analyzers (H2S, moisture analyzers, older chromatographs)
    # to the station Ethernet LAN. Same educational abstraction as serial-gateway
    # but with pipeline-specific context and connection descriptions.
    # Legacy analyzers at remote compressor stations often predate Ethernet by decades --
    # the serial gateway is how they appear on the station SCADA network.
    # [OT-REVIEW] Consider adding a connected_device_type enum register to differentiate
    # pipeline-serial from serial-gateway (optional future enhancement).
    holding:
      - address: 0
        name: "serial_port_status"
        description: "Serial port operational state (bridges legacy gas analyzers to station LAN)"
        unit: "enum"              # 0=offline, 1=online, 2=error
        scale_min: 0
        scale_max: 2
        writable: false
      - address: 1
        name: "serial_baud_rate"
        description: "Serial port baud rate (coded enum, not raw bps)"
        unit: "enum"              # 0=1200, 1=2400, 2=4800, 3=9600, 4=19200, 5=38400, 6=57600, 7=115200
        scale_min: 0
        scale_max: 7
        writable: false
      - address: 2
        name: "serial_data_format"
        description: "Serial data format (coded enum)"
        unit: "enum"              # 0=8N1, 1=8E1, 2=8O1, 3=7E1
        scale_min: 0
        scale_max: 3
        writable: false
      - address: 3
        name: "serial_mode"
        description: "Serial interface electrical mode (RS-485 2-wire typical for multidrop analyzer bus)"
        unit: "enum"              # 0=RS-232, 1=RS-422, 2=RS-485-2wire, 3=RS-485-4wire
        scale_min: 0
        scale_max: 3
        writable: false
      - address: 4
        name: "active_tcp_connections"
        description: "Current TCP client connections from station LAN devices polling analyzers"
        unit: "count"
        scale_min: 0
        scale_max: 4
        writable: false
      - address: 5
        name: "serial_tx_count"
        description: "Messages forwarded from TCP to serial analyzer bus"
        unit: "msgs"
        scale_min: 0
        scale_max: 65535
        writable: false
      - address: 6
        name: "serial_rx_count"
        description: "Messages received from serial analyzer bus"
        unit: "msgs"
        scale_min: 0
        scale_max: 65535
        writable: false
      - address: 7
        name: "serial_error_count"
        description: "Serial parity, framing, and overrun errors (elevated count may indicate noisy analyzer wiring in outdoor pipeline environment)"
        unit: "count"
        scale_min: 0
        scale_max: 65535
        writable: false
      - address: 8
        name: "uptime_hours"
        description: "Device uptime since last power cycle"
        unit: "hours"
        scale_min: 0
        scale_max: 65535
        writable: false
    coils: []  # Gateway has no coils (max_coils: 0)

diagnostics:
  web_server: true
  web_port: 80
  snmp: true
  syslog: false
  fault_log: false
  fault_log_depth: 0
