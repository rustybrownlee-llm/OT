# docker-compose.yml - OT Simulator Multi-Environment Orchestration
#
# Profile-based environment selection (FR-4: no profile starts nothing):
#   docker compose --profile water up           -- plant-water + monitor only
#   docker compose --profile pipeline up        -- plant-pipeline only
#   docker compose --profile water --profile pipeline up  -- all three services
#   docker compose up                           -- starts no services (explicit selection required)
#
# Both profiles can run simultaneously with no port conflicts:
#   Water/mfg:  Modbus TCP 5020-5022, 5030
#   Pipeline:   Modbus TCP 5040-5043
#
# Network topology mirrors the dual-facility architecture per ADR-003:
#   Water treatment plant: Purdue model (Levels 1-3, VLAN-segmented)
#   Manufacturing floor:   Legacy flat network (192.168.1.0/24, no segmentation)
#   Pipeline station:      Flat station LAN + WAN backhaul to SCADA master

name: ot-simulator

networks:
  # --------------------------------------------------------------------------
  # Water treatment plant -- Purdue-segmented (Levels 1-3)
  # --------------------------------------------------------------------------

  # Level 3: Site Operations (SCADA, engineering workstation)
  wt-level3:
    name: ot-wt-level3
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.30.0/24
          gateway: 10.10.30.1
    labels:
      ot.environment: "water-treatment"
      ot.purdue-level: "3"
      ot.description: "Site Operations - SCADA server and engineering workstation"

  # Level 2: Area Supervisory Control (HMI operator stations)
  wt-level2:
    name: ot-wt-level2
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.20.0/24
          gateway: 10.10.20.1
    labels:
      ot.environment: "water-treatment"
      ot.purdue-level: "2"
      ot.description: "Area Supervisory Control - HMI operator stations"

  # Level 1: Basic Process Control (PLCs and I/O modules)
  wt-level1:
    name: ot-wt-level1
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1
    labels:
      ot.environment: "water-treatment"
      ot.purdue-level: "1"
      ot.description: "Basic Process Control - PLCs and I/O modules"

  # --------------------------------------------------------------------------
  # Manufacturing floor -- legacy flat network (no VLANs, no segmentation)
  # --------------------------------------------------------------------------

  mfg-flat:
    name: ot-mfg-flat
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1
    labels:
      ot.environment: "manufacturing"
      ot.purdue-level: "legacy-flat"
      ot.description: "Legacy flat network - no VLANs, unmanaged switch, circa 1993"

  # --------------------------------------------------------------------------
  # Cross-plant connection -- direct Ethernet link (no firewall, no segmentation)
  # Models the dangerous default: no protection at the boundary between modern
  # and legacy networks.
  # --------------------------------------------------------------------------

  cross-plant:
    name: ot-cross-plant
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/30
          gateway: 172.16.0.1
    labels:
      ot.environment: "cross-plant"
      ot.description: "Direct link between water treatment Level 1 and manufacturing (no firewall)"

  # --------------------------------------------------------------------------
  # Pipeline monitoring station -- flat station LAN (unmanaged switch)
  # --------------------------------------------------------------------------

  ps-station-lan:
    name: ot-ps-station-lan
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.1.0/24
          gateway: 10.20.1.1
    labels:
      ot.environment: "pipeline-monitoring"
      ot.description: "Pipeline station LAN - flat Ethernet, unmanaged switch, single subnet"

  # Pipeline monitoring station -- WAN backhaul to remote SCADA master
  # TD-022: No latency simulation on this Docker bridge. Real satellite/cellular WAN
  # links have 500-700ms RTT; Docker bridge delivers sub-1ms. See ot.latency-note below.
  #
  # NOTE: mfg-serial-bus (RS-485) is NOT modeled as a Docker network. RS-485 is a
  # physical serial bus that cannot be represented as a Docker bridge.
  # TD-021: Port 5043 carries Modbus TCP from the Moxa NPort 5150 gateway. Serial
  # devices behind it (TotalFlow G5) are accessed via unit ID routing through the
  # gateway port. Port scans of the serial bus are not possible in the simulator.
  ps-wan-link:
    name: ot-ps-wan-link
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/30
          # OT-REVIEW: gateway omitted intentionally. On this /30 subnet the only
          # usable host addresses are 10.20.0.1 (SCADA master) and 10.20.0.2
          # (plant-pipeline container). Docker assigns the bridge gateway IP to its
          # internal interface; specifying gateway: 10.20.0.1 would steal the SCADA
          # master address. Omitting the field lets Docker auto-assign a non-conflicting
          # address outside the usable host range.
    labels:
      ot.environment: "pipeline-monitoring"
      ot.description: "Satellite/cellular WAN backhaul - point-to-point link to remote SCADA master"
      ot.latency-simulated: "false"
      ot.latency-note: "Real VSAT: 500-700ms RTT. Docker bridge: sub-1ms. See TD-022."

services:
  # --------------------------------------------------------------------------
  # plant-water: greenfield water/manufacturing environment (profile: water)
  # Hosts all water treatment PLCs (Levels 1-3) and manufacturing floor devices.
  # Modbus TCP: 5020-5022 (water treatment), 5030 (manufacturing Moxa gateway).
  # --------------------------------------------------------------------------
  plant-water:
    profiles: ["water"]
    build:
      context: .
      dockerfile: plant/Dockerfile
    container_name: ot-plant-water
    restart: unless-stopped
    command: ["--environment", "/design/environments/greenfield-water-mfg", "--log-level", "info"]
    networks:
      wt-level3:
        ipv4_address: 10.10.30.10
      wt-level2:
        ipv4_address: 10.10.20.10
      wt-level1:
        ipv4_address: 10.10.10.10
      mfg-flat:
        ipv4_address: 192.168.1.100
      # TD-018: cross-plant network assigns only 172.16.0.2 to the plant container.
      # Environment.yaml also defines 172.16.0.3 (mfg-gateway-01), which the plant simulates,
      # but Docker Compose cannot assign two IPs to one container on the same network.
      # Port scans of 172.16.0.3 will receive no response. This is a simulator constraint.
      cross-plant:
        ipv4_address: 172.16.0.2
    ports:
      # Modbus TCP - water treatment PLCs (Purdue Level 1)
      - "5020:5020"
      - "5021:5021"
      - "5022:5022"
      # Modbus TCP - manufacturing floor devices via NPort 5150 serial gateway
      # TD-019: mfg-serial-bus (RS-485) has no Docker network representation.
      # Port 5030 carries Modbus TCP from the NPort 5150 to host-accessible clients.
      - "5030:5030"
      # HMI ports (8080 water treatment, 8081 manufacturing) are intentionally omitted.
      # No HMI exists in Beta 0.2. They are declared in plant/Dockerfile EXPOSE for future use.
    environment:
      - OTS_LOG_LEVEL=info
      # OTS_HEALTH_PORTS overrides the hardcoded default in the plant binary.
      # FR-7: Health check must verify water/mfg-specific ports, not the pipeline range.
      - OTS_HEALTH_PORTS=5020,5021,5022,5030
    healthcheck:
      test: ["CMD", "/plant", "--health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    volumes:
      - ./design:/design:ro
    labels:
      ot.component: "plant-simulator"
      ot.environment: "greenfield-water-mfg"
      ot.description: "Simulated plant process: water treatment PLCs and manufacturing floor devices"

  # --------------------------------------------------------------------------
  # plant-pipeline: pipeline monitoring station environment (profile: pipeline)
  # Remote unmanned compressor station with flat station LAN and WAN backhaul.
  # Modbus TCP: 5040 (CompactLogix), 5041-5042 (ROC800 RTUs), 5043 (Moxa gateway).
  #
  # TD-023: This container is assigned 10.20.1.10 on ps-station-lan and 10.20.0.2 on
  # ps-wan-link. The environment also defines devices at 10.20.1.20, 10.20.1.21,
  # and 10.20.1.30, which the plant binary simulates internally. Docker cannot assign
  # multiple IPs to one container on the same network. Same class of limitation as TD-018.
  #
  # Note: ps-serial-bus (RS-485) is NOT modeled as a Docker network. See TD-021.
  # --------------------------------------------------------------------------
  plant-pipeline:
    profiles: ["pipeline"]
    build:
      context: .
      dockerfile: plant/Dockerfile
    container_name: ot-plant-pipeline
    restart: unless-stopped
    command: ["--environment", "/design/environments/pipeline-monitoring", "--log-level", "info"]
    networks:
      ps-station-lan:
        ipv4_address: 10.20.1.10
      ps-wan-link:
        ipv4_address: 10.20.0.2
    ports:
      # Modbus TCP - CompactLogix L33ER (station PLC / SCADA gateway, dual-homed)
      - "5040:5040"
      # Modbus TCP - Emerson ROC800 RTU (pipeline metering, AGA-3 custody transfer)
      - "5041:5041"
      # Modbus TCP - Emerson ROC800 RTU (station monitoring, pressures and valve control)
      - "5042:5042"
      # Modbus TCP - Moxa NPort 5150 gateway (bridges to TotalFlow G5 on RS-485 serial)
      # TD-021: Serial device ps-fc-01 (TotalFlow G5) is accessed via unit ID routing
      # through this port. Port scans of the RS-485 bus are not possible.
      - "5043:5043"
    environment:
      - OTS_LOG_LEVEL=info
      # OTS_HEALTH_PORTS overrides the hardcoded default in the plant binary.
      # FR-10: Health check must verify pipeline-specific ports, not the water/mfg range.
      - OTS_HEALTH_PORTS=5040,5041,5042,5043
    healthcheck:
      test: ["CMD", "/plant", "--health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    volumes:
      - ./design:/design:ro
    labels:
      ot.component: "plant-simulator"
      ot.environment: "pipeline-monitoring"
      ot.description: "Simulated pipeline compressor station: CompactLogix SCADA gateway, ROC800 RTUs, Moxa serial gateway"

  # --------------------------------------------------------------------------
  # monitor: security monitoring service (profiles: water, pipeline)
  # Observes both plant environments externally over the network -- no plant imports.
  # Attached to both wt-level3 and ps-station-lan to monitor both environments.
  # TD-020 resolved: monitor now covers both water/mfg and pipeline environments.
  # --------------------------------------------------------------------------
  monitor:
    profiles: ["water", "pipeline"]
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    container_name: ot-monitor
    restart: unless-stopped
    networks:
      # Level 3 SCADA network -- water/mfg environment visibility
      wt-level3:
        ipv4_address: 10.10.30.20
      # Pipeline station LAN -- pipeline environment visibility
      ps-station-lan:
        ipv4_address: 10.20.1.20
    ports:
      # Security analyst dashboard
      - "8090:8090"
      # Alert API
      - "8091:8091"
    depends_on:
      plant-water:
        condition: service_healthy
        required: false
      plant-pipeline:
        condition: service_healthy
        required: false
    volumes:
      # Mount monitoring config read-only. The image also contains a copy as fallback
      # (see monitoring/Dockerfile), but the volume mount takes precedence at runtime.
      - ./monitoring/config:/config:ro
      # Design library mounted read-only for future SOW-014.0 dashboard use.
      # The monitor binary does NOT read this mount in SOW-012.0.
      - ./design:/design:ro
    environment:
      - OTS_LOG_LEVEL=info
    healthcheck:
      # Real health check: HTTP GET /api/health verifies monitoring is functional.
      # TD-012 resolved: replaced file-existence check with API connectivity check.
      test: ["CMD", "/monitor", "--health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    labels:
      ot.component: "security-monitor"
      ot.description: "External security monitoring - Modbus polling and anomaly detection"
      ot.monitoring-placement: "level-3-scada"
      ot.monitoring-note: "[OT-REVIEW] Monitor at Level 3 observes SCADA polling traffic only. Traffic between Level 1 PLCs (e.g., PLC-to-PLC comms) is not visible from this vantage point. Compare with a Dragos sensor at a Level 1 SPAN port."
